<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Green Earth</title>
    <!-- Google Font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- Daisy Ui & Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Css Link  -->
    <link rel="stylesheet" href="./styles/style.css" />

    <!-- Font Awosome  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <main>
      <section class="py-12">
        <h2 class="text-center text-4xl font-bold text-[#15803D]">
          Choose Your Trees
        </h2>
        <div class="grid grid-cols-12 mx-auto w-11/12 mt-5">
          <!-- Catagories Tab -->
          <div class="col-span-2 shadow-lg p-5">
            <h2 class="text-xl font-semibold">Categories</h2>
            <div id="catagories-container" class="mt-4 space-y-3">
              <button
                class="btn btn-outline btn-success justify-start hover:text-white w-full active"
              >
                All Trees
              </button>
            </div>
          </div>
          <!-- product Area -->
          <div class="col-span-8 text-center">
            
            <div id="product-card-container" class="p-10 grid grid-cols-3 gap-8">
              
              
              
            
              
              
            </div>
          </div>
          <div class="col-span-2">
            <h2>Your Cart</h2>
          </div>
        </div>
      </section>
    </main>

    <script src="./script/index.js"></script>
  </body>
</html>
